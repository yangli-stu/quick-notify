user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '[$time_local] $status - $body_bytes_sent "$request"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/xml+rss;

    server {
        listen ${PORT:-8501};
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 隐藏 .html 后缀 - 直接服务文件，不重定向
        location ~ ^/(docs|architecture|about|demo)$ {
            try_files /$1.html =404;
        }

        # 支持单页应用路由
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 博客路由（/blog/slug 显示文章，/blog 显示博客列表）
        location /blog {
            try_files $uri $uri/ /blog.html;
        }

        location /blog/ {
            try_files $uri $uri/ /blog.html;
        }

        # 博客文章 markdown 文件（/blog-articles/*.md）
        location /blog-articles/ {
            try_files $uri $uri/ =404;
        }

        # 博客页面中的相对路径资源（/blog/xxx.html -> /xxx.html）
        location ~ ^/blog/(.+)\.html$ {
            try_files /$1.html =404;
        }

        # 静态资源缓存（CSS/JS/图片）
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # HTML 不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "OK";
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
